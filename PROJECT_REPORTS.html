<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Opendrap DevOps AI Platform — Architecture & Performance Audit</title>
<style>
  :root{
    --bg:#0a0e1f; --bg2:#0e1430; --card:rgba(255,255,255,.04); --card-bd:rgba(255,255,255,.09);
    --txt:#e8ecf8; --muted:#94a0c4; --mono:#aeb9e6;
    --g1:#7c3aed; --g2:#ec4899; --g3:#f97316;
    --crit:#ef4444; --high:#f97316; --med:#eab308; --low:#38bdf8; --ok:#22c55e;
    --grad:linear-gradient(110deg,#7c3aed,#ec4899 55%,#f97316);
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:radial-gradient(1200px 700px at 80% -10%,#1b1147 0%,transparent 55%),
    radial-gradient(900px 600px at -10% 10%,#3a0d3a 0%,transparent 50%),var(--bg);
    color:var(--txt);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.55;min-height:100vh;
  }
  code,.mono{font-family:"SF Mono",ui-monospace,"Cascadia Code",Consolas,Menlo,monospace}
  a{color:#c4b5fd;text-decoration:none}
  /* NAV */
  nav{
    position:sticky;top:0;z-index:50;backdrop-filter:blur(14px);
    background:rgba(10,14,31,.78);border-bottom:1px solid var(--card-bd);
  }
  .nav-in{max-width:1240px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{font-weight:800;letter-spacing:.3px;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;white-space:nowrap}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .tab{
    border:1px solid transparent;background:transparent;color:var(--muted);
    padding:7px 13px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;transition:.18s;white-space:nowrap}
  .tab:hover{color:var(--txt);background:rgba(255,255,255,.05)}
  .tab.active{color:#fff;background:var(--grad);box-shadow:0 6px 20px -8px var(--g2)}
  .search{position:relative}
  .search input{
    background:rgba(255,255,255,.05);border:1px solid var(--card-bd);color:var(--txt);
    padding:8px 12px 8px 32px;border-radius:10px;font-size:13px;width:210px;outline:none}
  .search input:focus{border-color:var(--g2)}
  .search svg{position:absolute;left:9px;top:8px;opacity:.5}
  /* LAYOUT */
  main{max-width:1240px;margin:0 auto;padding:28px 18px 90px}
  .panel{display:none;animation:fade .4s ease}
  .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  h1{font-size:clamp(26px,4vw,40px);margin:0 0 6px;line-height:1.1}
  h2{font-size:22px;margin:34px 0 14px;display:flex;align-items:center;gap:9px}
  h3{font-size:16px;margin:0 0 8px}
  .sub{color:var(--muted);max-width:760px}
  .grad-txt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  /* HERO */
  .hero{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:26px 0}
  .stat{
    background:var(--card);border:1px solid var(--card-bd);border-radius:16px;padding:18px;
    position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;background:var(--grad)}
  .stat .n{font-size:34px;font-weight:800;line-height:1}
  .stat .l{color:var(--muted);font-size:12.5px;margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
  /* CARDS */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .rcard{
    background:var(--card);border:1px solid var(--card-bd);border-radius:16px;padding:18px;cursor:pointer;transition:.2s}
  .rcard:hover{transform:translateY(-3px);border-color:var(--g2);box-shadow:0 16px 40px -22px var(--g2)}
  .rcard .ico{font-size:24px}
  .rcard h3{margin:8px 0 4px}
  .rcard p{color:var(--muted);font-size:13px;margin:0}
  .rcard .pill{display:inline-block;margin-top:10px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.06)}
  /* CALLOUT */
  .callout{
    border:1px solid var(--card-bd);border-left:3px solid var(--g2);
    background:linear-gradient(100deg,rgba(124,58,237,.10),rgba(236,72,153,.05));
    border-radius:12px;padding:14px 16px;margin:14px 0;font-size:14px}
  .callout b{color:#fff}
  .callout .tag{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:#f0abfc}
  /* FILTER CHIPS */
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
  .chip{border:1px solid var(--card-bd);background:transparent;color:var(--muted);padding:6px 13px;border-radius:20px;font-size:12.5px;cursor:pointer;font-weight:700;transition:.15s}
  .chip:hover{color:var(--txt)}
  .chip.active{background:#fff;color:#0a0e1f;border-color:#fff}
  .chip .c{opacity:.7;font-weight:600}
  /* FINDING CARD */
  .finding{
    background:var(--card);border:1px solid var(--card-bd);border-radius:14px;margin:11px 0;overflow:hidden;
    position:relative;transition:.2s}
  .finding:hover{border-color:rgba(255,255,255,.2)}
  .finding .rail{position:absolute;left:0;top:0;bottom:0;width:4px}
  .fhead{display:flex;align-items:center;gap:12px;padding:14px 16px 14px 20px;cursor:pointer}
  .fid{font-family:ui-monospace,monospace;font-size:12px;font-weight:700;color:#0a0e1f;background:#fff;padding:2px 8px;border-radius:6px;flex-shrink:0}
  .ftitle{font-weight:700;font-size:15px;flex:1}
  .floc{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--mono);background:rgba(255,255,255,.05);padding:3px 8px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
  .badge{font-size:10.5px;font-weight:800;letter-spacing:.5px;padding:3px 9px;border-radius:20px;flex-shrink:0;text-transform:uppercase}
  .metric{font-size:11.5px;color:var(--muted);font-family:ui-monospace,monospace;flex-shrink:0}
  .chev{transition:.2s;opacity:.6;flex-shrink:0}
  .finding.open .chev{transform:rotate(90deg)}
  .fbody{display:none;padding:0 16px 16px 20px;font-size:13.5px}
  .finding.open .fbody{display:block;animation:fade .25s}
  .fbody .lbl{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin:12px 0 4px}
  .fix-box{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:12px 14px;margin-top:6px}
  .fix-box .lbl{color:#86efac}
  pre{background:#070a16;border:1px solid var(--card-bd);border-radius:10px;padding:12px;overflow:auto;font-size:12px;margin:6px 0}
  pre code{color:#c8d3ff}
  .cmt{color:#6b7aa8}
  /* SEV COLORS */
  .s-critical{background:var(--crit)} .s-high{background:var(--high)} .s-medium{background:var(--med)} .s-low{background:var(--low)}
  .b-critical{background:rgba(239,68,68,.16);color:#fca5a5} .b-high{background:rgba(249,115,22,.16);color:#fdba74}
  .b-medium{background:rgba(234,179,8,.16);color:#fde047} .b-low{background:rgba(56,189,248,.16);color:#7dd3fc}
  /* TABLE */
  .tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--card-bd)}
  .tbl th{text-align:left;padding:10px 12px;background:rgba(255,255,255,.04);font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  .tbl td{padding:9px 12px;border-top:1px solid var(--card-bd);vertical-align:top}
  .tbl td.mono{font-family:ui-monospace,monospace;font-size:12px;color:var(--mono)}
  .vp{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:14px}
  .vp.ok{background:rgba(34,197,94,.15);color:#86efac}
  .vp.warn{background:rgba(234,179,8,.15);color:#fde047}
  .vp.bad{background:rgba(239,68,68,.15);color:#fca5a5}
  /* WATERFALL */
  .wf{margin:14px 0}
  .wf-row{display:flex;align-items:center;gap:12px;margin:7px 0;font-size:12.5px}
  .wf-lab{width:230px;flex-shrink:0;color:var(--muted);font-family:ui-monospace,monospace;font-size:11.5px}
  .wf-track{flex:1;background:rgba(255,255,255,.04);border-radius:8px;height:26px;position:relative;overflow:hidden}
  .wf-bar{position:absolute;top:0;bottom:0;border-radius:8px;background:var(--grad);width:0;transition:width 1s cubic-bezier(.2,.8,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:700;color:#fff;min-width:34px}
  .wf-bar.par{background:linear-gradient(110deg,#22c55e,#16a34a)}
  /* SIM */
  .sim{background:var(--card);border:1px solid var(--card-bd);border-radius:18px;padding:20px;margin:16px 0}
  .sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  .ctrl{margin:14px 0}
  .ctrl label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:var(--muted)}
  .ctrl label b{color:#fff}
  input[type=range]{width:100%;accent-color:var(--g2);height:5px}
  .toggle{display:flex;align-items:center;gap:10px;margin:18px 0;font-size:14px}
  .switch{position:relative;width:52px;height:28px;background:rgba(255,255,255,.12);border-radius:20px;cursor:pointer;transition:.2s;flex-shrink:0}
  .switch.on{background:linear-gradient(110deg,#22c55e,#16a34a)}
  .switch .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s}
  .switch.on .knob{left:27px}
  .out{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px}
  .outc{background:rgba(255,255,255,.04);border:1px solid var(--card-bd);border-radius:12px;padding:14px;text-align:center;transition:.3s}
  .outc .v{font-size:24px;font-weight:800;line-height:1}
  .outc .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:5px}
  .dots{display:flex;flex-wrap:wrap;gap:5px;margin-top:14px;align-content:flex-start;max-height:180px;overflow:hidden}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--g2);transition:.4s;opacity:.9}
  .dot.done{background:rgba(255,255,255,.10)}
  /* GAUGES */
  .gauges{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:12px}
  .gauge{background:var(--card);border:1px solid var(--card-bd);border-radius:16px;padding:16px;text-align:center}
  .gauge svg{transform:rotate(-90deg)}
  .gauge .gv{font-size:22px;font-weight:800}
  .gauge .gl{font-size:12.5px;color:var(--muted);margin-top:4px}
  /* TIMELINE */
  .tl{position:relative;margin:18px 0 0;padding-left:26px}
  .tl::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--g1),var(--g3))}
  .tl-item{position:relative;margin-bottom:16px}
  .tl-item::before{content:"";position:absolute;left:-22px;top:4px;width:12px;height:12px;border-radius:50%;background:var(--grad);box-shadow:0 0 0 4px rgba(124,58,237,.18)}
  .tl-item .t{font-weight:700}
  .tl-item .d{color:var(--muted);font-size:13px}
  .tl-item .loc{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--mono)}
  /* BAR CHART */
  .bars{margin-top:10px}
  .bar-row{display:flex;align-items:center;gap:12px;margin:6px 0;font-size:12.5px}
  .bar-lab{width:180px;flex-shrink:0;font-family:ui-monospace,monospace;font-size:11.5px;color:var(--muted)}
  .bar-track{flex:1;height:20px;background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;width:0;background:var(--grad);border-radius:6px;transition:width 1.1s cubic-bezier(.2,.8,.2,1)}
  .bar-val{width:54px;text-align:right;font-family:ui-monospace,monospace;font-size:11.5px;color:var(--muted)}
  .reveal{opacity:0;transform:translateY(18px);transition:.6s}
  .reveal.in{opacity:1;transform:none}
  .empty{color:var(--muted);text-align:center;padding:40px;font-style:italic}
  .note{font-size:12px;color:var(--muted);font-style:italic;margin-top:8px}
  /* back to top */
  #top{position:fixed;right:22px;bottom:22px;z-index:60;width:46px;height:46px;border-radius:50%;border:none;
    background:var(--grad);color:#fff;font-size:20px;cursor:pointer;opacity:0;pointer-events:none;transition:.3s;box-shadow:0 10px 30px -8px var(--g2)}
  #top.show{opacity:1;pointer-events:auto}
  @media(max-width:720px){
    .sim-grid{grid-template-columns:1fr}
    .floc{display:none}
    .wf-lab,.bar-lab{width:120px}
    .search input{width:140px}
    .nav-in{gap:8px}
  }
</style>
</head>

<nav>
  <div class="nav-in">
    <span class="brand">◆ OPENDRAP AUDIT</span>
    <div class="tabs" id="tabs"></div>
    <div class="search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input id="search" placeholder="Search findings…" autocomplete="off"/>
    </div>
  </div>
</nav>

<main id="main"></main>

<button id="top" title="Back to top">↑</button>

<script>
/* ============================================================
   DATA  — every claim cites a real file:line from the codebase.
   Estimates are explicitly marked "(est)".
   ============================================================ */

const REPORTS = [
  {id:"overview",   icon:"🛰️", name:"Overview",        blurb:"Hero stats, health scorecard & the top fixes."},
  {id:"security",   icon:"🛡️", name:"Security",         blurb:"Auth, secrets, IDOR & injection across the Worker."},
  {id:"agent",      icon:"💻", name:"Local Agent (server.py)", blurb:"The localhost shell agent — unauth RCE & injection."},
  {id:"concurrency",icon:"⚙️", name:"Concurrency",      blurb:"Durable Objects, the LLM hot path & a live simulator."},
  {id:"perf",       icon:"🚀", name:"Backend Perf",     blurb:"D1 query patterns, N+1 writes & the dashboard waterfall."},
  {id:"db",         icon:"🗄️", name:"Database (D1)",    blurb:"26-table schema, missing indexes & data-type smells."},
  {id:"frontend",   icon:"🎨", name:"Frontend",         blurb:"React bundle, code-splitting, polling & token storage."},
];

const FINDINGS = [
  /* ---------- SECURITY (Cloudflare Worker) ---------- */
  {id:"SEC-1",tab:"security",sev:"critical",title:"Hardcoded admin key grants full admin to anyone",
   loc:"workers/src/middleware/admin.ts:3",metric:"static secret",
   plain:"The whole admin panel is 'protected' by one password baked into the source code. Anyone who reads the repo can list, edit and delete every user and read every secret.",
   problem:"<code>const ADMIN_KEY = 'opendrapdev@2026';</code> and <code>if (key !== ADMIN_KEY)</code> (admin.ts:3,7). The key is a compile-time constant in git, not tied to any user or role. Admin routes (routes/admin.ts:11) trust only the <code>X-Admin-Key</code> header, exposing user delete/role-change and <code>listEnvVars</code> which returns secrets in cleartext (controllers/admin.ts:126-130).",
   fix:"Remove the constant. Require a verified JWT plus a DB <code>role === 'admin'</code> check (the <code>users.role</code> column already exists). Rotate the leaked key."},
  {id:"SEC-2",tab:"security",sev:"critical",title:"Weak, unsalted password hashing (plain SHA-256)",
   loc:"workers/src/auth/index.ts:23-29",metric:"no salt / 1 round",
   plain:"Passwords are stored as a single-round SHA-256 with no salt — trivially cracked with GPU/rainbow tables, and identical passwords get identical hashes.",
   problem:"<code>crypto.subtle.digest('SHA-256', data)</code> → hex (auth/index.ts:26). No salt, no key-stretching. Confirmed in DB: seed.sql:8 stores a bare 64-hex hash. <code>comparePassword</code> also uses non-constant-time <code>hashed === hash</code> (auth/index.ts:36).",
   fix:"Use PBKDF2 via WebCrypto (<code>deriveBits</code>, 100k+ iterations, random per-user salt) or scrypt/argon2. Store salt+iterations, use a constant-time compare, re-hash on next login."},
  {id:"SEC-3",tab:"security",sev:"critical",title:"JWT/dev secret committed to git",
   loc:"workers/.dev.vars:2",metric:"secret in repo",
   plain:"A secrets file is committed containing the JWT signing key. Anyone with repo access can forge valid login tokens for any user if that value is reused anywhere.",
   problem:"<code>git ls-files</code> confirms <code>workers/.dev.vars</code> is tracked; no <code>workers/.gitignore</code> and the root .gitignore doesn't cover it. JWTs are signed with <code>env.JWT_SECRET</code> (auth/index.ts:5-11); a known secret lets an attacker mint <code>{sub:&lt;anyUserId&gt;}</code> tokens and impersonate anyone, including admins.",
   fix:"<code>git rm --cached workers/.dev.vars</code>, add to .gitignore, rotate the secret, and set production <code>JWT_SECRET</code> only via <code>wrangler secret put</code>. Treat the current value as compromised."},
  {id:"SEC-4",tab:"security",sev:"critical",title:"IDOR: bugs & tasks have no project-membership check",
   loc:"workers/src/controllers/bugs.ts:62 · tasks.ts:60",metric:"broken access control",
   plain:"Any logged-in user can read, edit or delete any bug or task in any project just by guessing the id — there's no check that they belong to the project.",
   problem:"Handlers fetch by id and act with no membership verification: bugs.ts getBug(:62) updateBug(:75) deleteBug(:97) addBugComment(:110); listBugs(:44) takes <code>project_id</code> from the query unchecked; reportBug(:7) accepts arbitrary <code>body.project_id</code>. Same in tasks.ts (:60,:73,:94,:41,:7). Contrast projects.ts:72-76 which does it correctly.",
   fix:"In every bug/task handler resolve the project, load <code>ProjectRepository.getMembers()</code> and reject non-members — mirror the <code>updateProject</code> pattern."},
  {id:"SEC-5",tab:"security",sev:"critical",title:"IDOR → cross-tenant terminal command execution",
   loc:"workers/src/controllers/terminal.ts:32 · chat.ts:64",metric:"cross-tenant RCE",
   plain:"Any logged-in user can open ANY project's terminal WebSocket and run shell commands on that project's agent, and read/post in any chat — just by supplying the id.",
   problem:"<code>getWebSocket</code> (terminal.ts:32) derives the Durable Object from a user-supplied <code>projectId</code> query param (:35-39) with no membership check, then upgrades the socket; commands sent over it are executed by the connected agent. Chat: getChat(:64) getChatMessages(:77) sendMessage(:92) chatWebSocket(:141) all skip membership checks.",
   fix:"Verify project membership before creating/joining a terminal session and chat membership before any chat socket; reject otherwise."},
  {id:"SEC-6",tab:"security",sev:"high",title:"CORS wildcard origin combined with credentials",
   loc:"workers/src/index.ts:31-35",metric:"origin: '*'",
   plain:"The API tells every website 'you may call me and send credentials', widening CSRF/exfiltration exposure.",
   problem:"<code>cors({ origin:'*', credentials:true, allowHeaders:[…] })</code>. <code>ACAO:*</code> with <code>ACAC:true</code> is an invalid/insecure combination. Auth is Bearer-token so impact is reduced, but the policy intent is wrong.",
   fix:"Set <code>origin</code> to an explicit allowlist (e.g. <code>FRONTEND_URL</code>) and only enable credentials if cookies are actually used."},
  {id:"SEC-7",tab:"security",sev:"high",title:"Auth token accepted from URL query string",
   loc:"workers/src/middleware/auth.ts:15",metric:"token in URL",
   plain:"Tokens can be passed as ?token=… in the URL, which leaks into server/proxy logs, browser history and Referer headers.",
   problem:"<code>const queryToken = c.req.query('token')</code> (auth.ts:15,20-21). The WS/install flows embed <code>&token=…</code> in URLs. Combined with 7-day tokens (SEC-8) this is high-risk credential leakage.",
   fix:"Prefer <code>Authorization: Bearer</code> only. For WebSockets use a subprotocol header or a short-lived single-use ticket, never a long-lived JWT in the URL."},
  {id:"SEC-8",tab:"security",sev:"high",title:"7-day JWTs with no revocation; logout is a no-op",
   loc:"workers/src/auth/index.ts:10",metric:"exp: 7d",
   plain:"Login tokens last a full week and can't be revoked. A stolen token works for 7 days; 'logout' does nothing server-side.",
   problem:"<code>.setExpirationTime('7d')</code> (auth/index.ts:10). <code>logout</code> is a no-op (controllers/auth.ts:75-77). No token versioning/denylist. Compounds with SEC-3 and SEC-7.",
   fix:"Short access-token lifetime (15-60 min) + refresh tokens, or a <code>token_version</code> claim compared against the user row (already loaded at auth.ts:31). Support real revocation."},
  {id:"SEC-9",tab:"security",sev:"high",title:"Admin can escalate any account to admin",
   loc:"workers/src/controllers/admin.ts:91-94",metric:"priv-esc primitive",
   plain:"The admin update endpoint lets the (public, hardcoded) key set any user's role to admin and delete any user with no safeguards.",
   problem:"<code>if (VALID_ROLES.includes(body.role)) { fields.push('role = ?') … }</code> writes role directly (admin.ts:91-94); <code>deleteUserAdmin</code> (:118-122) deletes by id with no 'last admin' protection or audit. Given SEC-1, this is a direct privilege-escalation primitive.",
   fix:"Fix SEC-1 first; restrict role changes to genuine admins, log them, and prevent removing the final admin."},
  {id:"SEC-10",tab:"security",sev:"medium",title:"Verbose internal error messages returned to clients",
   loc:"workers/src/utils/helpers.ts:39-44",metric:"info leak",
   plain:"When something breaks, the raw internal error message is sent back to the client with HTTP 500.",
   problem:"<code>fail()</code> returns <code>error: err.message</code> and defaults to 500 for any non-AppError; used pervasively (bugs.ts, tasks.ts, chat.ts, terminal.ts…). The global onError (index.ts:392-398) is safe, but per-controller <code>fail()</code> bypasses it.",
   fix:"Only echo messages for known <code>AppError</code>s; for unexpected errors return a generic message and log server-side."},
  {id:"SEC-11",tab:"security",sev:"medium",title:"OAuth flows missing state parameter (login CSRF)",
   loc:"workers/src/controllers/auth.ts:92-103",metric:"no CSRF state",
   plain:"Google/GitHub login don't use a state parameter, so an attacker can stitch their auth code onto a victim's session.",

   fix:"Validate a session token on the WS connection, check <code>Origin</code> against an allowlist, bind to 127.0.0.1 with a per-session secret, and sandbox/allowlist commands."},
  {id:"AGT-2",tab:"agent",sev:"critical",title:"Command injection in subprocess construction",

   fix:"Don't build shell strings — use argv execution (<code>create_subprocess_exec</code>, no shell), or a locked-down PTY/container. Never interpolate cwd or input into a shell string."},

   plain:"Any known account logs in with the password 'demo', and the token issued is just the email — guessable and forgeable.",
   problem:"<code>if email in users and password == 'demo'</code> (:290); on success <code>token = email</code> (:292,318). <code>/api/auth/me</code> (:174) and <code>/api/terminal/session</code> (:328) trust this token with no signature or expiry.",

  {id:"CON-1",tab:"concurrency",sev:"critical",title:"All terminal traffic funneled through ONE Durable Object id",
   loc:"workers/src/controllers/terminal.ts:12 · index.ts:290",metric:"single thread for all",
   plain:"The installed agent always uses projectId='default', and browsers connect to the same id — so a single, single-threaded Durable Object instance is the bottleneck for the entire deployment.",
   problem:"<code>idFromName(`terminal-${projectId}`)</code> (terminal.ts:12,39) and the install script forces <code>projectId=default</code> (index.ts:290). Every output frame loops over ALL websockets and splices per-session 1000-line buffers (terminal.ts:248-263). With N viewers each output chunk does N sends + N array splices on one thread.",
   fix:"Shard the DO id per session/user (<code>terminal-${projectId}-${userId}</code>); use the Hibernatable WebSocket API (<code>state.acceptWebSocket()</code>); keep one shared ring buffer per DO instead of per-session 1000-line arrays."},
  {id:"CON-2",tab:"concurrency",sev:"high",title:"setInterval heartbeats inside Durable Objects",
   loc:"workers/src/durable-objects/terminal.ts:365-380",metric:"blocks hibernation",
   plain:"Timers inside a Durable Object keep it alive (and billable) 24/7 and are lost on eviction, so a crashed agent can look 'online'.",
   problem:"<code>startHeartbeatTimer</code> (terminal.ts:365-380, 30s) and <code>startHeartbeat</code> (agent.ts:140-146, 30s) use <code>setInterval</code>. It blocks hibernation and isn't durable; on eviction the timer is lost while persisted <code>agentSessionId</code> remains.",
   fix:"Replace with Durable Object Alarms (<code>state.storage.setAlarm()</code>) — durable, survive eviction, allow hibernation between checks."},
  {id:"CON-3",tab:"concurrency",sev:"high",title:"Blocking external LLM call on the request thread",
   loc:"workers/src/ai/index.ts:78-104",metric:"~2-8s/req (est)",
   plain:"Every AI endpoint holds the request open for the entire LLM generation (seconds), with no timeout, no streaming and an unguarded JSON.parse of the result.",
   problem:"<code>callGLM</code> does <code>await fetch(…)</code> (ai/index.ts:81) for glm-4-flash, max_tokens 2048 (:91) — ~2-8s/req (est), the dominant cost by ~3 orders of magnitude vs D1. Results are <code>JSON.parse</code>d assuming valid JSON (:35,63,75); only <code>test-run</code> catches errors. No fetch timeout, no retry/backoff.",
   fix:"Add an AbortController timeout; for long jobs return 202 and run in <code>ctx.waitUntil()</code>/a Queue with D1 polling; stream (<code>stream:true</code>) via SSE; wrap JSON.parse in try/catch + validate."},
  {id:"CON-4",tab:"concurrency",sev:"high",title:"Synchronous activity-log write on every /api/* request",
   loc:"workers/src/index.ts:38-56",metric:"+10-60ms/req (est)",
   plain:"Every API call pays for a logging DB write on the hot path — and pointlessly re-SELECTs the row it just inserted, then throws the result away.",
   problem:"The global middleware does <code>await repo.create(…)</code> after each request; <code>LogRepository.create</code> is TWO round trips — INSERT then <code>SELECT * WHERE id=?</code> (repositories/logs.ts:69-76) — and the returned value is discarded (index.ts:48). Plus auth adds one D1 SELECT per request (middleware/auth.ts:31).",
   fix:"Drop the post-insert SELECT (build the object in memory); move the write into <code>ctx.waitUntil()</code> (it's already best-effort) or batch via Queues/Analytics Engine."},
  {id:"CON-5",tab:"concurrency",sev:"medium",title:"O(connections) work per terminal output frame",
   loc:"workers/src/durable-objects/terminal.ts:248-263",metric:"~1-3ms/frame×N (est)",
   plain:"Each agent output chunk is split/filtered/re-joined and then pushed into a per-viewer 1000-line buffer with an O(n) array splice — all on the single DO thread.",
   problem:"<code>output.split('\\n').filter(...).join('\\n')</code> per frame + per-session <code>push</code>/<code>splice(0,len-1000)</code> + stringify + send (terminal.ts:248-263). 4KB chunk × 50 viewers ≈ 1-3ms/frame (est); hundreds of frames/sec saturates the thread (compounds CON-1).",
   fix:"One shared index-based ring buffer per DO (no splice); filter once; combine with CON-1 sharding."},

   loc:"workers/src/durable-objects/terminal.ts:183-184",metric:"persistence race",
   plain:"Storage writes the cold-start path depends on aren't awaited, so the handler returns before persistence is acknowledged.",
   problem:"<code>this.state.storage.put(…)</code>/<code>.delete(…)</code> with no <code>await</code> (terminal.ts:183-184,212,128-129,353-354; agent.ts:228). The persisted <code>lastHeartbeat</code>/<code>agentSessionId</code> read on restart (terminal.ts:31-46) may lag reality; rejections are silent.",

function switchTab(id){
  activeTab=id; sevFilter="all";
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===id));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active",p.id==="p-"+id));
  // reset chips in this panel
  const panel=$("#p-"+id);
  panel?.querySelectorAll(".chip").forEach(ch=>ch.classList.toggle("active",ch.dataset.sev==="all"));
  applyFilter();
  window.scrollTo({top:0,behavior:"smooth"});
  setTimeout(()=>runAnims(id),120);
}

function applyFilter(){
  const panel=$("#p-"+activeTab); if(!panel) return;
  let shown=0;
  panel.querySelectorAll(".finding").forEach(f=>{
    const okSev = sevFilter==="all"||f.dataset.sev===sevFilter;
    const okTxt = !searchQ || f.dataset.txt.includes(searchQ);
    const vis = okSev && okTxt;
    f.style.display = vis?"":"none";
    if(vis){shown++; if(searchQ) f.classList.add("open"); else f.classList.remove("open");}
  });
  let empty=panel.querySelector(".empty");
  const wrap=panel.querySelector("[data-findings]");
  if(wrap){
    if(shown===0){ if(!empty){empty=document.createElement("div");empty.className="empty";empty.textContent="No findings match.";wrap.after(empty);} }
    else if(empty){empty.remove();}
  }
}

function searchAll(q){
  searchQ=q.trim().toLowerCase();
  if(!searchQ){applyFilter();return;}
  // jump to the tab with the most matches
  let best=activeTab,bestN=-1;
  REPORTS.forEach(r=>{
    if(r.id==="overview")return;
    const n=FINDINGS.filter(f=>f.tab===r.id && (f.id+' '+f.title+' '+f.loc+' '+f.plain).toLowerCase().includes(searchQ)).length;
    if(n>bestN){bestN=n;best=r.id;}
  });
  if(bestN>0 && activeTab!==best){switchTab(best);}
  applyFilter();
}

/* animations triggered per tab */
function runAnims(id){
  if(id==="overview"){
    document.querySelectorAll("#p-overview [data-count]").forEach(countUp);
    drawGauges();
  }
  if(id==="perf"){ drawWaterfall(); }
  if(id==="concurrency"){ simUpdate(); }
  if(id==="frontend"){ drawBars(); }
}

function countUp(el){
  const target=+el.dataset.count; let cur=0; const step=Math.max(1,Math.ceil(target/40));
  clearInterval(el._t);
  el._t=setInterval(()=>{cur+=step; if(cur>=target){cur=target;clearInterval(el._t);} el.textContent=cur;},22);
}

function drawGauges(){
  const box=$("#gauges"); if(!box) return;
  box.innerHTML=GAUGES.map(g=>{
    const r=42,circ=2*Math.PI*r;
    const col=g.v>=70?"#22c55e":g.v>=45?"#eab308":g.v>=30?"#f97316":"#ef4444";
    return `<div class="gauge" data-goto="${g.id}" style="cursor:pointer">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="9"/>
        <circle class="gring" cx="55" cy="55" r="${r}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"
          stroke-dasharray="${circ}" stroke-dashoffset="${circ}" data-off="${circ*(1-g.v/100)}" data-circ="${circ}"/>
      </svg>
      <div class="gv" style="color:${col}">${g.v}</div><div class="gl">${g.l}</div></div>`;
  }).join("");
  requestAnimationFrame(()=>box.querySelectorAll(".gring").forEach(c=>{
    c.style.transition="stroke-dashoffset 1.2s cubic-bezier(.2,.8,.2,1)";
    c.style.strokeDashoffset=c.dataset.off;
  }));
  box.querySelectorAll("[data-goto]").forEach(el=>el.onclick=()=>switchTab(el.dataset.goto));
}

function drawWaterfall(){
  const box=$("#wf"); if(!box) return;
  const total=WF.reduce((a,b)=>a+b.ms,0);
  box.innerHTML=WF.map((s,i)=>`<div class="wf-row"><div class="wf-lab">${s.l}</div>
    <div class="wf-track"><div class="wf-bar" data-w="${(s.ms/total*100).toFixed(1)}" style="left:${(i*s.ms/total*100).toFixed(1)}%">${s.ms}ms</div></div></div>`).join("")
    + `<div class="wf-row"><div class="wf-lab" style="color:#86efac">ALL 8 in Promise.all</div>
       <div class="wf-track"><div class="wf-bar par" data-w="${(50/total*100).toFixed(1)}">~50ms</div></div></div>`;
  requestAnimationFrame(()=>box.querySelectorAll(".wf-bar").forEach((b,i)=>setTimeout(()=>b.style.width=b.dataset.w+"%",i*70)));
}

function drawBars(){
  const box=$("#bars"); if(!box) return;
  const max=Math.max(...FILES.map(f=>f.v));
  box.innerHTML=FILES.map(f=>`<div class="bar-row"><div class="bar-lab">${f.n}</div>
    <div class="bar-track"><div class="bar-fill" data-w="${(f.v/max*100).toFixed(1)}"></div></div>
    <div class="bar-val">${f.v}</div></div>`).join("");
  requestAnimationFrame(()=>box.querySelectorAll(".bar-fill").forEach((b,i)=>setTimeout(()=>b.style.width=b.dataset.w+"%",i*60)));
}

/* concurrency simulator */
const SVC=0.15; // seconds per serialized op (est)
function simUpdate(){
  const cores=+($("#cores")?.value||4), people=+($("#people")?.value||40), fix=$("#fix")?.classList.contains("on");
  if($("#s-cores")) $("#s-cores").textContent=cores;
  if($("#s-people")) $("#s-people").textContent=people;
  const lanes = fix?cores:1;
  const tp = (lanes/SVC);
  const drain = Math.ceil(people/lanes)*SVC;
  const wait = drain;
  const fmt=s=> s>=1? s.toFixed(1)+"s" : Math.round(s*1000)+"ms";
  const tpEl=$("#o-tp"),drEl=$("#o-drain"),wtEl=$("#o-wait");
  if(!tpEl) return;
  tpEl.textContent=tp.toFixed(1);
  drEl.textContent=fmt(drain);
  wtEl.textContent=fmt(wait);
  const colr=(el,good,warn)=>{const v=parseFloat(el.parentElement===null?0:0);};
  // recolor by drain time
  [drEl,wtEl].forEach(el=>{el.style.color = drain<1?"#22c55e":drain<5?"#eab308":"#ef4444";});
  tpEl.style.color = tp>=20?"#22c55e":tp>=6?"#eab308":"#ef4444";
  // dots
  const dots=$("#dots");
  dots.innerHTML=Array.from({length:people},()=>`<div class="dot"></div>`).join("");
  const nodes=[...dots.children];
  let i=0; clearInterval(dots._t);
  dots._t=setInterval(()=>{
    for(let k=0;k<lanes && i<nodes.length;k++,i++) nodes[i].classList.add("done");
    if(i>=nodes.length) clearInterval(dots._t);
  }, Math.max(60,SVC*1000));
}

/* reveal on scroll */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.12});

function wire(){
  $("#tabs").querySelectorAll(".tab").forEach(t=>t.onclick=()=>switchTab(t.dataset.tab));
  document.querySelectorAll("[data-goto]").forEach(el=>el.onclick=()=>switchTab(el.dataset.goto));
  // finding expand
  document.querySelectorAll(".finding .fhead").forEach(h=>h.onclick=()=>h.parentElement.classList.toggle("open"));
  // chips
  document.querySelectorAll("[data-chipset]").forEach(set=>{
    set.querySelectorAll(".chip").forEach(ch=>ch.onclick=()=>{
      set.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"));
      ch.classList.add("active"); sevFilter=ch.dataset.sev; applyFilter();
    });
  });
  // sim controls
  ["cores","people"].forEach(id=>{const el=$("#"+id); if(el) el.oninput=simUpdate;});
  const fx=$("#fix"); if(fx) fx.onclick=()=>{fx.classList.toggle("on");simUpdate();};
  // reveal
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
}

$("#search").addEventListener("input",e=>searchAll(e.target.value));
window.addEventListener("scroll",()=>$("#top").classList.toggle("show",scrollY>500));
$("#top").onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

render();
</script>
